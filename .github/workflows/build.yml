name: Build RME

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-24.04

    env:
      VCPKG_DEFAULT_TRIPLET: x64-linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            ccache \
            pkg-config \
            libglu1-mesa-dev \
            freeglut3-dev \
            libxmu-dev \
            libxi-dev \
            libgtk-3-dev \
            libx11-dev \
            libxkbcommon-dev \
            libsecret-1-dev \
            libgcrypt20-dev \
            libsystemd-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            autoconf \
            automake \
            autoconf-archive \
            libtool \
            libltdl-dev \
            nasm \
            curl \
            zip \
            unzip \
            tar

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '6bc1613f18f850c60d906575296f982c6dfcc9e0'

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: ImguiMapEditor/build/vcpkg_installed
          key: vcpkg-installed-${{ runner.os }}-${{ hashFiles('ImguiMapEditor/vcpkg.json') }}
          restore-keys: |
            vcpkg-installed-${{ runner.os }}-

      - name: Setup ccache
        run: |
          echo "/usr/lib/ccache" >> $GITHUB_PATH
          mkdir -p ~/.ccache
          ccache --max-size=500M
          ccache --set-config=compression=true

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-rme-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ccache-rme-${{ runner.os }}-

      - name: Build RME
        run: |
          cmake -S ImguiMapEditor -B ImguiMapEditor/build -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build ImguiMapEditor/build --parallel

      - name: Show ccache stats
        run: ccache --show-stats

      - name: Upload RME binary
        uses: actions/upload-artifact@v4
        with:
          name: rme-linux
          path: |
            ImguiMapEditor/build/TibiaMapEditor
            ImguiMapEditor/build/data
          retention-days: 30

  build-windows-x64:
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' }}
    runs-on: windows-2025

    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '6bc1613f18f850c60d906575296f982c6dfcc9e0'

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: ImguiMapEditor/build-windows/vcpkg_installed
          key: vcpkg-installed-${{ runner.os }}-${{ env.VCPKG_DEFAULT_TRIPLET }}-${{ hashFiles('ImguiMapEditor/vcpkg.json') }}
          restore-keys: |
            vcpkg-installed-${{ runner.os }}-${{ env.VCPKG_DEFAULT_TRIPLET }}-
            vcpkg-installed-${{ runner.os }}-

      - name: Build RME (Windows x64)
        shell: pwsh
        run: |
          cmake -S ImguiMapEditor -B ImguiMapEditor/build-windows -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET="$env:VCPKG_DEFAULT_TRIPLET"
          cmake --build ImguiMapEditor/build-windows --config Release --parallel

      - name: Upload RME binary
        uses: actions/upload-artifact@v4
        with:
          name: rme-windows-x64
          path: |
            ImguiMapEditor/build-windows/Release/TibiaMapEditor.exe
            ImguiMapEditor/build-windows/Release/data
          retention-days: 30
