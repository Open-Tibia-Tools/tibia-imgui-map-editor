name: '🔎 Gemini Auto PR Review'

on:
  pull_request:
    types:
      - 'opened'
      - 'reopened'
      - 'ready_for_review'
      - 'synchronize'

concurrency:
  group: '${{ github.workflow }}-${{ github.event.pull_request.number }}'
  cancel-in-progress: true

jobs:
  review:
    if: |-
      ${{
        github.event.pull_request.head.repo.fork == false &&
        github.event.pull_request.draft == false &&
        github.event.pull_request.commits <= 20
      }}
    uses: './.github/workflows/gemini-review.yml'
    permissions:
      contents: 'read'
      id-token: 'write'
      issues: 'write'
      pull-requests: 'write'
    with:
      additional_context: |-
        Automatic PR review triggered by the `${{ github.event.action }}` event.
        The PR currently contains `${{ github.event.pull_request.commits }}` commits.
        Keep the review focused on concrete correctness, regression, architecture, and testing issues.
    secrets: 'inherit'
